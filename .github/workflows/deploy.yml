# Módulo: .github/workflows/deploy.yml
# Versão: v1.2.0
# Descrição: Automação completa CI/CD. Resolução de anomalia de ambiente (Detached HEAD). Injeção da flag '--branch main' para forçar a marcação de 'Produção' na infraestrutura do Cloudflare Pages. Atualizado para Node.js 24.

name: Deploy Pipeline Cloudflare

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          
      - name: Instalar e Publicar Worker
        working-directory: ./mainsite-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        # O Worker (Hono/Backend) já assume Produção nativamente no comando padrão
        run: |
          npm install
          npx wrangler deploy

  deploy-admin:
    runs-on: ubuntu-latest
    needs: deploy-worker
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          
      - name: Instalar, Compilar e Publicar Admin
        working-directory: ./mainsite-admin
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        # Injeção cirúrgica da flag --branch main
        run: |
          npm install
          npm run build
          npx wrangler pages deploy ./dist --project-name=mainsite-admin --branch main

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-worker
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          
      - name: Instalar, Compilar e Publicar Frontend
        working-directory: ./mainsite-frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        # Injeção cirúrgica da flag --branch main
        run: |
          npm install
          npm run build
          npx wrangler pages deploy ./dist --project-name=mainsite-frontend --branch main