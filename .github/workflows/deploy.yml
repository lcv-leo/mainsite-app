name: Deploy

on:
  push:
    branches: [main]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_OPTIONS: "--no-deprecation"
  WRANGLER_VERSION: "latest"

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            ./mainsite-worker/package-lock.json
            ./mainsite-frontend/package-lock.json

      - name: Install e Deploy Worker
        working-directory: ./mainsite-worker
        run: |
          npm install
          npx wrangler@${WRANGLER_VERSION} deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Install, Build e Deploy Frontend
        working-directory: ./mainsite-frontend
        run: |
          npm install
          npm run build
          npx wrangler@${WRANGLER_VERSION} pages deploy ./dist --project-name=mainsite-frontend --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VITE_API_SECRET: ${{ secrets.VITE_API_SECRET }}
          VITE_MERCADOPAGO_PUBLIC_KEY: ${{ secrets.VITE_MERCADOPAGO_PUBLIC_KEY }}
          VITE_SUMUP_PUBLIC_API_KEY: ${{ secrets.VITE_SUMUP_PUBLIC_API_KEY }}
          VITE_BRAND_ICONS_BASE_URL: https://mainsite-app.lcv.rio.br/api/uploads/brands
