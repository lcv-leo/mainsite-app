name: Deploy

on:
  push:
    branches: [main]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_OPTIONS: "--no-deprecation"
  WRANGLER_VERSION: "latest"

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            ./mainsite-worker/package-lock.json
            ./mainsite-frontend/package-lock.json

      - name: Inject D1 database_id from secret (mainsite-worker + mainsite-frontend)
        run: |
          if [ -z "${D1_DATABASE_ID:-}" ]; then
            echo "::error::D1_DATABASE_ID secret is not set" >&2
            exit 1
          fi
          for CFG in mainsite-worker/wrangler.json mainsite-frontend/wrangler.json; do
            jq --arg id "$D1_DATABASE_ID" '.d1_databases[0].database_id = $id' "$CFG" > "$CFG.tmp"
            mv "$CFG.tmp" "$CFG"
            grep -q "$D1_DATABASE_ID" "$CFG" || { echo "::error::Substitution failed in $CFG" >&2; exit 1; }
            if grep -q "00000000-0000-0000-0000-000000000000" "$CFG"; then
              echo "::error::Placeholder still present in $CFG" >&2
              exit 1
            fi
          done
        env:
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}

      - name: Install e Deploy Worker
        working-directory: ./mainsite-worker
        run: |
          npm ci
          npm audit --audit-level=high
          npm run lint
          npm test
          npx wrangler@${WRANGLER_VERSION} deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Install, Build e Deploy Frontend
        working-directory: ./mainsite-frontend
        run: |
          npm ci
          npm audit --audit-level=high
          npm run lint
          npm test
          npm run build
          npx wrangler@${WRANGLER_VERSION} pages deploy ./dist --project-name=mainsite-frontend --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VITE_SUMUP_PUBLIC_API_KEY: ${{ secrets.VITE_SUMUP_PUBLIC_API_KEY }}
          VITE_BRAND_ICONS_BASE_URL: /api/uploads/brands
          VITE_TURNSTILE_SITE_KEY: 0x4AAAAAAC11tvghUM34XXGV
