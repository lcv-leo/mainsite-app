name: Deploy Pipeline Cloudflare

on:
  push:
    branches:
      - main

# Injeção global para forçar as Actions internas do GitHub a usarem o Node 24 e silenciar o aviso
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Atualizado para a versão LTS mais recente
          
      - name: Instalar e Publicar Worker
        working-directory: ./mainsite-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install
          npx wrangler deploy

  deploy-admin:
    runs-on: ubuntu-latest
    needs: deploy-worker
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          
      - name: Instalar, Compilar e Publicar Admin
        working-directory: ./mainsite-admin
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install
          npm run build
          npx wrangler pages deploy ./dist --project-name=mainsite-admin

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-worker
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          
      - name: Instalar, Compilar e Publicar Frontend
        working-directory: ./mainsite-frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install
          npm run build
          npx wrangler pages deploy ./dist --project-name=mainsite-frontend