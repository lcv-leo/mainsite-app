name: Deploy

on:
  push:
    branches: [main]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_OPTIONS: "--no-deprecation"
  WRANGLER_VERSION: "latest"

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            ./mainsite-worker/package-lock.json
            ./mainsite-frontend/package-lock.json

      - name: Install e Deploy Worker
        working-directory: ./mainsite-worker
        run: |
          npm ci
          npm audit --audit-level=high
          npm run lint
          npm test
          npx wrangler@${WRANGLER_VERSION} deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Install, Build e Deploy Frontend
        working-directory: ./mainsite-frontend
        run: |
          npm ci
          npm audit --audit-level=high
          npm run lint
          npm test
          npm run build
          npx wrangler@${WRANGLER_VERSION} pages deploy ./dist --project-name=mainsite-frontend --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VITE_SUMUP_PUBLIC_API_KEY: ${{ secrets.VITE_SUMUP_PUBLIC_API_KEY }}
          VITE_BRAND_ICONS_BASE_URL: /api/uploads/brands
          VITE_TURNSTILE_SITE_KEY: 0x4AAAAAAC11tvghUM34XXGV
