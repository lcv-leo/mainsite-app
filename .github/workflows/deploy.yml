# Módulo: .github/workflows/deploy.yml
# Versão: v1.4.0
# Descrição: Automação completa CI/CD para o ecossistema Mainsite. Solução definitiva para a depreciação do Node 20. Atualização direta dos módulos actions/checkout e actions/setup-node para a versão v5 nos três microsserviços.

name: Deploy Pipeline Cloudflare

on:
  push:
    branches:
      - main

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          
      - name: Instalar e Publicar Worker
        working-directory: ./mainsite-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install
          npx wrangler deploy

  deploy-admin:
    runs-on: ubuntu-latest
    needs: deploy-worker
    steps:
      - name: Checkout do código
        uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          
      - name: Instalar, Compilar e Publicar Admin
        working-directory: ./mainsite-admin
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install
          npm run build
          npx wrangler pages deploy ./dist --project-name=mainsite-admin --branch production

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-worker
    steps:
      - name: Checkout do código
        uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          
      - name: Instalar, Compilar e Publicar Frontend
        working-directory: ./mainsite-frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install
          npm run build
          npx wrangler pages deploy ./dist --project-name=mainsite-frontend --branch production