# Módulo: .github/workflows/deploy.yml
# Versão: v1.5.0
# Descrição: Automação completa CI/CD para o ecossistema Mainsite. Implementação de inteligência de cache nativo (npm) nos três microsserviços para eliminação de redundância de download e otimização drástica do tempo de execução da esteira.

name: Deploy Pipeline Cloudflare

on:
  push:
    branches:
      - main

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v5
      
      - name: Setup Node.js com Inteligência de Cache
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: './mainsite-worker/package-lock.json'
          
      - name: Instalar e Publicar Worker
        working-directory: ./mainsite-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install
          npx wrangler deploy

  deploy-admin:
    runs-on: ubuntu-latest
    needs: deploy-worker
    steps:
      - name: Checkout do código
        uses: actions/checkout@v5
      
      - name: Setup Node.js com Inteligência de Cache
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: './mainsite-admin/package-lock.json'
          
      - name: Instalar, Compilar e Publicar Admin
        working-directory: ./mainsite-admin
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install
          npm run build
          npx wrangler pages deploy ./dist --project-name=mainsite-admin --branch production

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-worker
    steps:
      - name: Checkout do código
        uses: actions/checkout@v5
      
      - name: Setup Node.js com Inteligência de Cache
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: './mainsite-frontend/package-lock.json'
          
      - name: Instalar, Compilar e Publicar Frontend
        working-directory: ./mainsite-frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install
          npm run build
          npx wrangler pages deploy ./dist --project-name=mainsite-frontend --branch production