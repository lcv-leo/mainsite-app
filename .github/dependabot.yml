version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "05:00"
      timezone: "America/Sao_Paulo"
    labels:
      - "dependencies"
      - "github-actions"
    assignees:
      - "lcv-leo"
    commit-message:
      prefix: "deps"
      include: "scope"
    open-pull-requests-limit: 10

  - package-ecosystem: "npm"
    directory: "/mainsite-frontend"
    schedule:
      interval: "daily"
      time: "05:20"
      timezone: "America/Sao_Paulo"
    labels:
      - "dependencies"
      - "npm"
      - "frontend"
    assignees:
      - "lcv-leo"
    commit-message:
      prefix: "deps"
      include: "scope"
    versioning-strategy: increase
    groups:
      dev-dependencies:
        patterns:
          - "eslint*"
          - "typescript"
          - "@types/*"
        update-types:
          - "major"
          - "minor"
          - "patch"
    open-pull-requests-limit: 10

  - package-ecosystem: "npm"
    directory: "/mainsite-worker"
    schedule:
      interval: "daily"
      time: "05:40"
      timezone: "America/Sao_Paulo"
    labels:
      - "dependencies"
      - "npm"
      - "worker"
    assignees:
      - "lcv-leo"
    commit-message:
      prefix: "deps"
      include: "scope"
    versioning-strategy: increase
    groups:
      dev-dependencies:
        patterns:
          - "eslint*"
          - "typescript"
          - "@types/*"
          - "wrangler"
        update-types:
          - "major"
          - "minor"
          - "patch"
    open-pull-requests-limit: 5
