<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Divagações Filosóficas Favicon: Owl (wisdom) -->
  <!-- Head circle -->
  <circle cx="16" cy="13" r="10" fill="#0d0d0d"/>
  <!-- Ear tufts -->
  <polygon points="8,5 6,1 11,6" fill="#0d0d0d"/>
  <polygon points="24,5 26,1 21,6" fill="#0d0d0d"/>
  <!-- Eyes (white circles with dark pupils) -->
  <circle cx="12" cy="12" r="4" fill="#ffffff"/>
  <circle cx="20" cy="12" r="4" fill="#ffffff"/>
  <circle cx="13" cy="12" r="2" fill="#0d0d0d"/>
  <circle cx="21" cy="12" r="2" fill="#0d0d0d"/>
  <!-- Eye shine -->
  <circle cx="13.8" cy="11.2" r="0.7" fill="#ffffff"/>
  <circle cx="21.8" cy="11.2" r="0.7" fill="#ffffff"/>
  <!-- Beak -->
  <polygon points="16,15 14.5,17.5 17.5,17.5" fill="#6b6462"/>
  <!-- Body (simple oval) -->
  <ellipse cx="16" cy="25" rx="7" ry="7" fill="#0d0d0d"/>
  <!-- Chest pattern -->
  <ellipse cx="16" cy="24" rx="4" ry="5" fill="#f5f4f4" opacity="0.15"/>
</svg>